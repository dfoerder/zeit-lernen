<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Zeit lernen</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5276">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="app">
    <header>
      <h1>Zeit lernen</h1>
    </header>

    <nav id="mode-tabs">
      <button class="tab active" data-mode="tageszeit">Tageszeit</button>
      <button class="tab" data-mode="24h">24h-Format</button>
      <button class="tab" data-mode="umgangssprache">Umgangssprache</button>
    </nav>

    <main>
      <div id="examples" class="hidden">
        <h2 id="examples-title"></h2>
        <p id="examples-desc"></p>
        <table id="examples-table"></table>
        <button id="start-btn">Training starten</button>
      </div>

      <div id="training" class="hidden">
        <div id="clock-container">
          <svg id="clock" viewBox="0 0 200 200" width="180" height="180"></svg>
        </div>

        <div id="prompt"></div>

        <div id="picker-area" class="hidden"></div>

        <div id="input-area" class="hidden">
          <input type="text" id="answer" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Antwort eingeben...">
        </div>

        <div id="action-bar">
          <button id="check-btn">Prüfen</button>
          <button id="skip-btn">Überspringen</button>
        </div>

        <div id="feedback" class="hidden"></div>

        <div id="valid-answers" class="hidden"></div>

        <div id="score-bar">
          <span id="score">0 / 0</span>
          <span id="streak"></span>
          <button id="examples-btn">Beispiele</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
